on:
  push:
    tags:
      - 'v*'

name: Release

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write

    env:
      DOCKER_REPO: ghcr.io/fernandodelucca/docker-network-dhcp
      PLATFORMS: linux/amd64,linux/386,linux/arm64,linux/arm/v7

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install script dependencies
        run: pip3 install -r scripts/requirements.txt

      - id: vars
        name: Generate release vars
        run: |
          echo "version=$(echo "${{ github.ref }}" | sed -r 's|refs/tags/v(.+)|\1|')" >> $GITHUB_OUTPUT
          echo "Changelog: " > release.md
          # On the first release there is no previous tag — fall back to the
          # full history rather than failing the workflow.
          if PREV=$(git describe --tags --abbrev=0 "${{ github.event.ref }}^" 2>/dev/null); then
            git log --pretty=format:" - %s" "$PREV..${{ github.event.ref }}" >> release.md
          else
            git log --pretty=format:" - %s" "${{ github.event.ref }}" >> release.md
          fi

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Export registry credentials
        run: |
          echo "REGISTRY_USERNAME=${{ github.actor }}" >> $GITHUB_ENV
          echo "REGISTRY_PASSWORD=${{ secrets.GITHUB_TOKEN }}" >> $GITHUB_ENV

      - name: Tag with release
        run: |
          scripts/tag_multiarch_plugin.py -p $PLATFORMS "$DOCKER_REPO:latest" ${{ steps.vars.outputs.version }}
          scripts/tag_multiarch_plugin.py -p $PLATFORMS "$DOCKER_REPO:latest" release

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
